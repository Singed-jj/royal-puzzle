<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save image as" to create the icon PNGs.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawBearIcon(ctx, size) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const r = s * 0.38;

  // Background circle
  ctx.fillStyle = '#FFF8E7';
  ctx.beginPath();
  ctx.arc(cx, cy, s / 2, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  const earR = r * 0.35;
  const earOffset = r * 0.7;
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.arc(cx - earOffset, cy - earOffset, earR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + earOffset, cy - earOffset, earR, 0, Math.PI * 2);
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#D4A574';
  ctx.beginPath();
  ctx.arc(cx - earOffset, cy - earOffset, earR * 0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + earOffset, cy - earOffset, earR * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = '#A0722A';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Muzzle
  ctx.fillStyle = '#D4A574';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.25, r * 0.45, r * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#2A1A0E';
  const eyeY = cy - r * 0.15;
  const eyeX = r * 0.3;
  ctx.beginPath();
  ctx.arc(cx - eyeX, eyeY, r * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + eyeX, eyeY, r * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#2A1A0E';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.1, r * 0.1, r * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#2A1A0E';
  ctx.lineWidth = s * 0.01;
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.1, r * 0.15, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
}

['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  drawBearIcon(ctx, canvas.width);
});
</script>
</body>
</html>
